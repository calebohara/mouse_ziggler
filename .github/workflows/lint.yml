name: lint

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Set up Python 3.11
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install lint tooling
        run: |
          python -m pip install --upgrade pip
          pip install ruff mypy
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Ruff
        run: ruff check .

      - name: Mypy
        # --platform win32 so Windows-only ctypes attrs (WinDLL, WinError,
        # get_last_error) resolve from typeshed instead of being flagged
        # missing on the Linux runner. --ignore-missing-imports for pystray
        # which ships no py.typed marker.
        # noidle.py (entry point) is excluded to avoid a "duplicate module named
        # noidle" conflict with src/noidle/__init__.py. The entry point is a
        # thin runner; all meaningful logic lives in src/noidle/ and is checked.
        run: mypy --platform win32 --ignore-missing-imports src
